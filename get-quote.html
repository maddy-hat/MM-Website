<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Quote | MM Engineers</title>

    <link rel="stylesheet" href="quote.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="quote-page">

    <div class="quote-container">

        <h1>Request a Quote</h1>

        <p>
            Tell us about your project and our team will provide a customized solution.
        </p>

        <form>

            <div class="form-row">

                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" placeholder="Enter company name">
                </div>

                <div class="form-group">
                    <label>Contact Person</label>
                    <input type="text" placeholder="Enter your name">
                </div>

            </div>

            <div class="form-row">

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="Enter email">
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" placeholder="Enter phone number">
                </div>

            </div>

            <div class="form-group">
                <label>Required Service</label>

                <select>
                    <option>Select Service</option>
                    <option>MEP Engineering</option>
                    <option>Civil Construction</option>
                    <option>Power System Studies</option>
                    <option>Electrical Design</option>
                    <option>Protection Coordination Study</option>
                    <option>Arc Flash Study</option>
                </select>
            </div>

            <div class="form-group">
                <label>Project Location</label>
                <input type="text" placeholder="Project location">
            </div>

            <div class="form-group">
                <label>Project Description</label>
                <textarea placeholder="Describe your project requirements"></textarea>
            </div>

            <button type="submit">
                Submit Request
            </button>

        </form>

        <a href="index.html" class="back-home">
            ← Back to Home
        </a>

    </div>

</div>

</body>
</html>
